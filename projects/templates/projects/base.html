<!DOCTYPE html>
<html lang="ru" data-theme="dark-slate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}TaskTracker{% endblock %}</title>
<style>
/* ══════════════════════════════════════════
   THEMES — dark
══════════════════════════════════════════ */
[data-theme="dark-slate"] {
  --bg:#0f1117; --bg2:#181c26; --bg3:#1e2333; --surface:#252b3b;
  --border:#2e3548; --border2:#3d4560;
  --text:#e2e6f0; --text2:#8b94b0; --text3:#505870;
  --accent:#5b7fff; --accent2:#7b9bff;
  --green:#34c77b; --amber:#f59e0b; --red:#f16060;
  --tag-bg:#1e2848; --tag-text:#7b9bff;
  --nav-bg:#12151f; --input-bg:#13172080;
}
[data-theme="dark-forest"] {
  --bg:#0d1410; --bg2:#131a15; --bg3:#192019; --surface:#1f2820;
  --border:#283028; --border2:#364038;
  --text:#d8eed8; --text2:#7aaa80; --text3:#445548;
  --accent:#4caf72; --accent2:#6ed492;
  --green:#4caf72; --amber:#e8a030; --red:#e06060;
  --tag-bg:#1a3020; --tag-text:#6ed492;
  --nav-bg:#0b1009; --input-bg:#19201980;
}
[data-theme="dark-crimson"] {
  --bg:#130d0d; --bg2:#1c1010; --bg3:#221515; --surface:#2a1818;
  --border:#3a2020; --border2:#502828;
  --text:#f0dede; --text2:#b07070; --text3:#6a3838;
  --accent:#e05555; --accent2:#f07575;
  --green:#5aaa70; --amber:#e8a030; --red:#e05555;
  --tag-bg:#2a1515; --tag-text:#f07575;
  --nav-bg:#0e0808; --input-bg:#22151580;
}
[data-theme="dark-neutral"] {
  --bg:#111; --bg2:#181818; --bg3:#1e1e1e; --surface:#252525;
  --border:#303030; --border2:#404040;
  --text:#e8e8e8; --text2:#888; --text3:#505050;
  --accent:#a0a0a0; --accent2:#c8c8c8;
  --green:#5aaa70; --amber:#d4900a; --red:#cc5555;
  --tag-bg:#1e1e1e; --tag-text:#c8c8c8;
  --nav-bg:#0d0d0d; --input-bg:#1e1e1e80;
}

/* ══════════════════════════════════════════
   THEMES — light
══════════════════════════════════════════ */
[data-theme="light-paper"] {
  --bg:#f5f4ef; --bg2:#ffffff; --bg3:#eeecea; --surface:#e8e6e0;
  --border:#d8d5cc; --border2:#bfbcb2;
  --text:#1a1a18; --text2:#555450; --text3:#9a9890;
  --accent:#2952cc; --accent2:#4068e0;
  --green:#1a7a40; --amber:#9a6800; --red:#c03030;
  --tag-bg:#e8edfb; --tag-text:#2952cc;
  --nav-bg:#1a1a18; --input-bg:#ffffff;
}
[data-theme="light-warm"] {
  --bg:#faf7f2; --bg2:#ffffff; --bg3:#f2ede4; --surface:#e8e0d4;
  --border:#ddd5c8; --border2:#c8bcac;
  --text:#1e1a14; --text2:#60503c; --text3:#a09080;
  --accent:#b05c20; --accent2:#d07030;
  --green:#2a8040; --amber:#a06010; --red:#b83030;
  --tag-bg:#faeee0; --tag-text:#b05c20;
  --nav-bg:#1e1a14; --input-bg:#ffffff;
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.6;
  transition: background .18s, color .18s;
}
a { color: inherit; text-decoration: none; }

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
nav {
  background: var(--nav-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex; align-items: center; height: 52px;
  position: sticky; top: 0; z-index: 200;
}
.nav-brand {
  font-size: 13px; font-weight: 700; letter-spacing: -.2px;
  margin-right: 1.25rem; white-space: nowrap;
}
[data-theme="dark-slate"] .nav-brand,
[data-theme="dark-forest"] .nav-brand,
[data-theme="dark-crimson"] .nav-brand,
[data-theme="dark-neutral"] .nav-brand { color: #fff; }
[data-theme="light-paper"] .nav-brand,
[data-theme="light-warm"] .nav-brand { color: #fff; }
.nav-brand em { color: var(--accent); font-style: normal; }

.nav-links { display: flex; }
.nav-links a {
  padding: 0 11px; height: 52px; display: flex; align-items: center;
  font-size: 13px; color: #666; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color .12s;
}
.nav-links a:hover { color: #aaa; }
.nav-links a.active { color: #fff; border-bottom-color: var(--accent); }
[data-theme="light-paper"] .nav-links a.active,
[data-theme="light-warm"] .nav-links a.active { color: #fff; }

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

/* Quick-add button in nav */
.nav-add {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; font-size: 12px; font-family: inherit;
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px; cursor: pointer;
  transition: opacity .12s; white-space: nowrap; margin-right: 4px;
}
.nav-add:hover { opacity: .85; }

.nav-user { font-size: 12px; color: #555; padding: 0 4px; }
.nav-logout {
  font-size: 12px; color: #555; padding: 5px 10px;
  border: 1px solid #333; border-radius: 5px;
  background: none; cursor: pointer; font-family: inherit;
  transition: color .12s, border-color .12s;
}
.nav-logout:hover { color: #aaa; border-color: #555; }

/* Theme dots */
.theme-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: transform .12s, border-color .12s; flex-shrink: 0;
}
.theme-dot:hover { transform: scale(1.2); }
.theme-dot.active { border-color: #fff; }
[data-theme="light-paper"] .theme-dot.active,
[data-theme="light-warm"] .theme-dot.active { border-color: #333; }
.theme-sep { width: 1px; height: 16px; background: #333; margin: 0 3px; }

/* ══════════════════════════════════════════
   QUICK-ADD PANEL (dropdown-style, no fixed)
══════════════════════════════════════════ */
.quick-panel {
  display: none;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 1rem 1.25rem 1.25rem;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
}
.quick-panel.open { display: block; }

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.container { max-width: 1000px; margin: 0 auto; padding: 1.75rem 1.5rem; }
.page-header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.page-title { font-size: 20px; font-weight: 600; letter-spacing: -.4px; }
.page-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-size: 13px; border-radius: 7px;
  cursor: pointer; font-family: inherit; border: 1px solid transparent;
  transition: background .12s, opacity .12s; white-space: nowrap; line-height: 1;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: .86; }
.btn-ghost { background: transparent; color: var(--text2); border-color: var(--border2); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-danger { background: transparent; color: var(--red); border-color: var(--border); }
.btn-danger:hover { background: rgba(220,50,50,.08); border-color: var(--red); }
.btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 5px; }

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.125rem 1.25rem; margin-bottom: 10px;
}
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .4px; }

/* ══════════════════════════════════════════
   FORMS
══════════════════════════════════════════ */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }
.fg { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: .2px; }
input[type=text], input[type=date], input[type=password],
input[type=number], input[type=month], select, textarea {
  width: 100%; padding: 8px 11px; font-size: 13px; font-family: inherit;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); outline: none;
  transition: border-color .12s;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 68px; }
select option { background: var(--bg3); color: var(--text); }
.field-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ══════════════════════════════════════════
   BADGES & DOTS
══════════════════════════════════════════ */
.badge {
  display: inline-block; font-size: 11px;
  padding: 2px 8px; border-radius: 20px; white-space: nowrap;
}
.b-date { background: var(--bg3); color: var(--text3); }
.b-hours { background: var(--tag-bg); color: var(--tag-text); }
.b-init { background: rgba(245,158,11,.12); color: var(--amber); }
.b-proj { background: rgba(91,127,255,.1); color: var(--accent2); }

.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.dot-done { background: var(--green); }
.dot-in_progress { background: var(--amber); }
.dot-todo { background: var(--text3); }
.dot-deferred { background: var(--red); }

/* ══════════════════════════════════════════
   STAT CARDS
══════════════════════════════════════════ */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: .875rem 1rem; }
.stat-val { font-size: 22px; font-weight: 600; letter-spacing: -.5px; }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; }

/* ══════════════════════════════════════════
   TASK ROW
══════════════════════════════════════════ */
.task-row { display: flex; gap: 10px; align-items: flex-start; }
.task-text { font-size: 14px; color: var(--text); line-height: 1.5; flex: 1; }
.task-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.task-basis { font-size: 12px; color: var(--text3); margin-top: 4px; line-height: 1.5; }
.task-actions { display: flex; gap: 5px; margin-top: 8px; }

/* ══════════════════════════════════════════
   SIDEBAR LAYOUT
══════════════════════════════════════════ */
.layout { display: grid; grid-template-columns: 210px 1fr; gap: 1.25rem; }
.sidebar-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; padding: 0 4px; }
.proj-item {
  padding: 8px 10px; border-radius: 7px; border: 1px solid transparent;
  cursor: pointer; transition: background .12s; display: flex; align-items: center; gap: 8px;
  text-decoration: none;
}
.proj-item:hover { background: var(--bg3); }
.proj-item.active { background: var(--surface); border-color: var(--border2); }
.proj-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.proj-name { font-size: 13px; color: var(--text); flex: 1; line-height: 1.3; }
.proj-cnt { font-size: 11px; color: var(--text3); }

/* ══════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════ */
.filter-bar {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 9px; padding: 10px 12px;
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem;
  align-items: flex-end;
}
.filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 110px; }

/* ══════════════════════════════════════════
   MISC
══════════════════════════════════════════ */
.breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.breadcrumb a { color: var(--text2); transition: color .12s; }
.breadcrumb a:hover { color: var(--text); }

.messages { margin-bottom: 1rem; }
.message { padding: 9px 14px; border-radius: 7px; font-size: 13px; margin-bottom: 6px; }
.message.success { background: rgba(52,199,123,.1); color: var(--green); border: 1px solid rgba(52,199,123,.2); }
.message.error   { background: rgba(220,50,50,.1);   color: var(--red);   border: 1px solid rgba(220,50,50,.2); }

.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }

.report-group-title {
  font-size: 14px; font-weight: 500; padding: 10px 0 8px;
  border-bottom: 1px solid var(--border); margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.text-report {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 9px; padding: 1.125rem 1.25rem;
  font-family: 'Courier New', monospace; font-size: 12px;
  white-space: pre-wrap; line-height: 1.8; color: var(--text2);
  max-height: 500px; overflow-y: auto;
}

.pagination { display: flex; gap: 4px; margin-top: 1rem; justify-content: center; flex-wrap: wrap; }
.page-link {
  padding: 5px 11px; border-radius: 5px; font-size: 12px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); cursor: pointer; text-decoration: none; transition: background .12s;
}
.page-link:hover, .page-link.current { background: var(--surface); color: var(--text); border-color: var(--border2); }

@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .layout { grid-template-columns: 1fr; }
  nav { padding: 0 1rem; gap: .5rem; }
  .container { padding: 1rem; }
  .nav-user { display: none; }
}
</style>
</head>
<body>

{% if user.is_authenticated %}
<nav>
  <div class="nav-brand">tt<em>/</em></div>
  <div class="nav-links">
    <a href="{% url 'index' %}" {% if request.resolver_match.url_name == 'index' %}class="active"{% endif %}>дашборд</a>
    <a href="{% url 'report' %}" {% if request.resolver_match.url_name == 'report' %}class="active"{% endif %}>отчёт</a>
  </div>
  <div class="nav-right">
    <button class="nav-add" onclick="toggleQuick()" type="button">+ задача</button>

    <!-- dark themes -->
    <div class="theme-dot" style="background:#5b7fff" title="Dark Slate"    onclick="setTheme('dark-slate')"    id="td-dark-slate"></div>
    <div class="theme-dot" style="background:#4caf72" title="Dark Forest"   onclick="setTheme('dark-forest')"   id="td-dark-forest"></div>
    <div class="theme-dot" style="background:#e05555" title="Dark Crimson"  onclick="setTheme('dark-crimson')"  id="td-dark-crimson"></div>
    <div class="theme-dot" style="background:#888"    title="Dark Neutral"  onclick="setTheme('dark-neutral')"  id="td-dark-neutral"></div>
    <!-- separator -->
    <div class="theme-sep"></div>
    <!-- light themes -->
    <div class="theme-dot" style="background:#2952cc;border:2px solid #ccc" title="Light Paper" onclick="setTheme('light-paper')" id="td-light-paper"></div>
    <div class="theme-dot" style="background:#b05c20;border:2px solid #ccc" title="Light Warm"  onclick="setTheme('light-warm')"  id="td-light-warm"></div>

    <div class="nav-user">{{ user.username }}</div>
    <a href="{% url 'logout' %}" class="nav-logout">выйти</a>
  </div>
</nav>

<!-- Quick-add panel sits right under navbar, full-width, inside flow -->
<div style="max-width:1000px;margin:0 auto;padding:0 1.5rem">
  <div class="quick-panel" id="quick-panel">
    <div class="card-title" style="margin-bottom:.75rem">быстрое добавление задачи</div>
    <form method="post" action="{% url 'quick_add' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">
      <div class="form-grid">
        <div class="fg">
          <label>проект *</label>
          <select name="project_id" required>
            <option value="">— выберите —</option>
            {% for p in user.projects.all %}<option value="{{ p.pk }}">{{ p.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="fg">
          <label>дата *</label>
          <input type="date" name="date" value="{% now 'Y-m-d' %}" required>
        </div>
        <div class="fg">
          <label>статус</label>
          <select name="status">
            <option value="done" selected>Выполнено</option>
            <option value="in_progress">В работе</option>
            <option value="todo">Запланировано</option>
            <option value="deferred">Отложено</option>
          </select>
        </div>
        <div class="fg">
          <label>часы</label>
          <input type="text" name="hours" placeholder="2.5 или 2ч30м или 2:30">
          <span class="field-hint">Форматы: 2.5 · 2,5 · 2ч30м · 2:30</span>
        </div>
        <div class="fg full">
          <label>задача / описание *</label>
          <textarea name="task" placeholder="Что было сделано..." required style="min-height:60px"></textarea>
        </div>
        <div class="fg full">
          <label>обоснование</label>
          <input type="text" name="basis" placeholder="Номер письма, ссылка...">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button type="submit" class="btn btn-primary">сохранить</button>
        <button type="button" class="btn btn-ghost" onclick="toggleQuick()">отмена</button>
      </div>
    </form>
  </div>
</div>
{% endif %}

<div class="container">
  {% if messages %}
  <div class="messages">
    {% for message in messages %}<div class="message {{ message.tags }}">{{ message }}</div>{% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script>
/* ── theme ── */
const THEMES = ['dark-slate','dark-forest','dark-crimson','dark-neutral','light-paper','light-warm'];
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('tt-theme', t);
  THEMES.forEach(id => {
    const el = document.getElementById('td-' + id);
    if (el) el.classList.toggle('active', id === t);
  });
}
(function() { setTheme(localStorage.getItem('tt-theme') || 'dark-slate'); })();

/* ── quick-add ── */
function toggleQuick() {
  const p = document.getElementById('quick-panel');
  if (!p) return;
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    const ta = p.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 50);
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const p = document.getElementById('quick-panel');
    if (p) p.classList.remove('open');
  }
});
</script>
</body>
</html>
