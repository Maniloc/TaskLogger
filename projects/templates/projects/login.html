{% extends 'projects/base.html' %}
{% block title %}Вход — TaskLogger{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:360px">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text)">tt<span style="color:var(--accent)">/</span></div>
      <div style="font-size:13px;color:var(--text3);margin-top:6px">TaskLogger · учёт рабочих задач</div>
    </div>
    <div class="card" style="padding:1.75rem">
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="message error" style="margin-bottom:1rem">Неверный логин или пароль</div>
        {% endif %}
        <div class="fg" style="margin-bottom:14px">
          <label>логин</label>
          <input type="text" name="username" autofocus required autocomplete="username">
        </div>
        <div class="fg" style="margin-bottom:1.25rem">
          <label>пароль</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">
          войти
        </button>
      </form>
    </div>
    <div style="text-align:center;margin-top:1rem;font-size:12px;color:var(--text3)">
      Нет аккаунта? Попросите администратора прислать приглашение.
    </div>
  </div>
</div>
{% endblock %}
