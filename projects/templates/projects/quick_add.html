{% extends 'projects/base.html' %}
{% block title %}Быстрое добавление задачи{% endblock %}
{% block content %}
<div class="page-title" style="margin-bottom:1.25rem">быстрое добавление задачи</div>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="fg"><label>проект *</label>
        <select name="project_id" required>
          <option value="">— выберите проект —</option>
          {% for p in projects %}<option value="{{ p.pk }}">{{ p.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="fg"><label>дата *</label><input type="date" name="date" value="{% now 'Y-m-d' %}" required></div>
      <div class="fg"><label>статус</label>
        <select name="status">{% for val,label in status_choices %}<option value="{{ val }}"{% if val == 'done' %} selected{% endif %}>{{ label }}</option>{% endfor %}</select>
      </div>
      <div class="fg">
        <label>часы</label>
        <input type="text" name="hours" placeholder="2.5 или 2ч30м или 2:30">
        <span class="field-hint">Форматы: 2.5 · 2,5 · 2ч30м · 2:30</span>
      </div>
      <div class="fg full"><label>задача / описание *</label><textarea name="task" placeholder="Что было сделано..." required></textarea></div>
      <div class="fg full"><label>обоснование</label><input type="text" name="basis" placeholder="Номер письма, ссылка..."></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button type="submit" class="btn btn-primary">сохранить задачу</button>
      <a href="/" class="btn btn-ghost">отмена</a>
    </div>
  </form>
</div>
{% endblock %}
