{% extends 'projects/base.html' %}
{% block title %}Чат — TaskTracker{% endblock %}
{% block content %}

<style>
.chat-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  height: calc(100vh - 52px - 3.5rem);
  min-height: 500px;
  max-height: calc(100vh - 52px - 3.5rem);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

/* ── Sidebar ── */
.chat-sidebar {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg2);
  overflow: hidden;
  min-height: 0;
}
.chat-sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.chat-sidebar-title {
  font-size: 14px; font-weight: 600; color: var(--text);
}
.chat-new-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent); color: #fff; border: none;
  font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: opacity .12s; line-height: 1;
}
.chat-new-btn:hover { opacity: .85; }

/* New conversation panel */
.chat-new-panel {
  display: none;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.chat-new-panel.open { display: block; }
.chat-search {
  width: 100%; padding: 7px 10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px;
  outline: none; font-family: inherit;
}
.chat-search:focus { border-color: var(--accent); }
.chat-user-list {
  max-height: 160px; overflow-y: auto; margin-top: 6px;
}
.chat-user-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 6px; cursor: pointer;
  text-decoration: none; transition: background .12s;
}
.chat-user-item:hover { background: var(--surface); }
.chat-user-av {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.chat-user-name { font-size: 13px; color: var(--text); }

/* Conversation list */
.chat-conv-list { flex: 1; overflow-y: auto; min-height: 0; }
.chat-conv-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px; cursor: pointer; text-decoration: none;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.chat-conv-item:hover { background: var(--bg3); }
.chat-conv-item.active { background: var(--surface); border-left: 3px solid var(--accent); padding-left: 11px; }
.chat-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.chat-conv-body { flex: 1; min-width: 0; }
.chat-conv-name { font-size: 13px; font-weight: 500; color: var(--text); }
.chat-conv-preview {
  font-size: 12px; color: var(--text3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-top: 2px;
}
.chat-conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.chat-conv-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
.chat-unread-badge {
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  min-width: 18px; text-align: center;
}

/* ── Main chat area ── */
.chat-main {
  display: flex; flex-direction: column; background: var(--bg);
  overflow: hidden; /* prevents expansion beyond grid cell */
  min-height: 0;    /* critical: allows flex child to shrink below content size */
  position: relative; /* for emoji picker and drop overlay */
}
.chat-main-header {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex; align-items: center; gap: 10px;
}
.chat-main-name { font-size: 15px; font-weight: 600; color: var(--text); }
.chat-online { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

/* Messages area */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 4px;
  min-height: 0; /* critical for flex scroll */
}
.chat-day-sep {
  text-align: center; font-size: 11px; color: var(--text3);
  margin: 10px 0; position: relative;
}
.chat-day-sep::before {
  content: '';
  position: absolute; top: 50%; left: 0; right: 0;
  height: 1px; background: var(--border);
}
.chat-day-sep span {
  background: var(--bg); padding: 0 10px;
  position: relative; z-index: 1;
}

/* Message bubbles */
.msg-row {
  display: flex; gap: 8px; align-items: flex-end;
  margin-bottom: 1px;
}
.msg-row.mine { flex-direction: row-reverse; }
.msg-row.mine + .msg-row.mine .msg-av,
.msg-row:not(.mine) + .msg-row:not(.mine) .msg-av { visibility: hidden; }

.msg-av {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--surface); color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.msg-bubble {
  max-width: 68%; padding: 8px 12px;
  border-radius: 16px; font-size: 14px; line-height: 1.5;
  word-wrap: break-word;
}
.msg-row:not(.mine) .msg-bubble {
  background: var(--bg2); color: var(--text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}
.msg-row.mine .msg-bubble {
  background: var(--accent); color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-time {
  font-size: 10px; color: var(--text3);
  margin: 0 4px; align-self: flex-end; flex-shrink: 0;
}

/* Input area */
.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex; gap: 10px; align-items: flex-end;
}
.chat-input {
  flex: 1; padding: 10px 14px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 22px; color: var(--text); font-size: 14px;
  font-family: inherit; outline: none; resize: none;
  max-height: 120px; min-height: 40px; line-height: 1.45;
  transition: border-color .12s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 16px;
  transition: opacity .12s, transform .1s;
}
.chat-send-btn:hover { opacity: .88; }
.chat-send-btn:active { transform: scale(.94); }

/* Empty state */
.chat-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text3); font-size: 14px; gap: 10px;
}
.chat-empty-icon { font-size: 40px; opacity: .4; }

@media (max-width: 640px) {
  .chat-layout { grid-template-columns: 1fr; height: auto; }
  .chat-sidebar { display: none; }
}

/* Remove container padding on chat pages so layout fills viewport correctly */
body:has(.chat-layout) .container {
  padding-top: 0.75rem;
  padding-bottom: 0;
}

/* Also fix room.html drop overlay positioning */
.chat-main { position: relative; }
</style>

{% block chat_content %}{% endblock %}

{% endblock %}
