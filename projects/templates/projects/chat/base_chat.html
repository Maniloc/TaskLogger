{% extends 'projects/base.html' %}
{% block title %}Чат — TaskTracker{% endblock %}
{% block content %}

<style>
/* ── Chat layout ── */
.chat-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  height: calc(100vh - 52px - 3.5rem);
  max-height: calc(100vh - 52px - 3.5rem);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
body:has(.chat-layout) .container { padding-top: 0.75rem; padding-bottom: 0; }

/* ── Sidebar ── */
.chat-sidebar {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--bg2); overflow: hidden; min-height: 0;
}
.chat-sidebar-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.chat-sidebar-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.chat-new-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent); color: #fff; border: none;
  font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: opacity .12s; line-height: 1;
}
.chat-new-btn:hover { opacity: .85; }

/* New chat panel */
.chat-new-panel { display: none; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg3); }
.chat-new-panel.open { display: block; }
.chat-search { width: 100%; padding: 7px 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
.chat-search:focus { border-color: var(--accent); }
.chat-user-list { max-height: 180px; overflow-y: auto; margin-top: 6px; }
.chat-user-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; text-decoration: none; transition: background .12s; }
.chat-user-item:hover { background: var(--surface); }
.chat-user-av { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.chat-user-name { font-size: 13px; color: var(--text); }

/* Conv list */
.chat-conv-list { flex: 1; overflow-y: auto; min-height: 0; }
.chat-conv-item { display: flex; align-items: flex-start; gap: 9px; padding: 10px 13px; cursor: pointer; text-decoration: none; border-bottom: 1px solid var(--border); transition: background .1s; }
.chat-conv-item:hover { background: var(--bg3); }
.chat-conv-item.active { background: var(--surface); border-left: 3px solid var(--accent); padding-left: 10px; }
.chat-av { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; object-fit: cover; }
.chat-av.group { border-radius: 10px; font-size: 16px; }
.chat-conv-body { flex: 1; min-width: 0; }
.chat-conv-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 5px; }
.chat-conv-preview { font-size: 12px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.chat-conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.pin-icon { font-size: 11px; opacity: .6; transform: rotate(45deg); display: inline-block; }
.saved-conv { background: var(--accent-bg) !important; }
.saved-conv .chat-conv-name { color: var(--accent2); font-weight: 600; }
.pinned-conv { border-left: 2px solid var(--amber) !important; }
.chat-conv-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
.chat-unread-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.muted-icon { font-size: 12px; opacity: .5; }

/* Online dot */
.online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; display: inline-block; box-shadow: 0 0 5px var(--green); }
.offline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; display: inline-block; }

/* ── Main chat ── */
.chat-main { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; min-height: 0; position: relative; }
.chat-main-header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.chat-main-name { font-size: 15px; font-weight: 600; color: var(--text); }
.chat-main-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* Messages */
.chat-messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 3px; min-height: 0; }
.chat-day-sep { text-align: center; font-size: 11px; color: var(--text3); margin: 8px 0; position: relative; }
.chat-day-sep::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }
.chat-day-sep span { background: var(--bg); padding: 0 10px; position: relative; z-index: 1; }

/* Message bubbles */
.msg-row { display: flex; gap: 7px; align-items: flex-end; margin-bottom: 1px; position: relative; }
.msg-row.mine { flex-direction: row-reverse; }
.msg-av-wrap { width: 28px; height: 28px; flex-shrink: 0; position: relative; }
.msg-av-wrap img, .msg-av-inner { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; background: var(--accent); }
.msg-av-wrap .online-dot { position: absolute; bottom: 0; right: 0; width: 8px; height: 8px; border: 2px solid var(--bg); }

.msg-bubble { max-width: 68%; padding: 7px 12px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
.msg-row:not(.mine) .msg-bubble { background: var(--bg2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.msg-row.mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg-sender-name { font-size: 11px; font-weight: 600; color: var(--accent2); margin-bottom: 3px; }
.msg-time { font-size: 10px; color: var(--text3); align-self: flex-end; flex-shrink: 0; }
.msg-text { white-space: pre-wrap; word-break: break-word; }
.msg-edited {
  font-size: 10px;
  color: rgba(255,255,255,.45);
  margin-left: 4px;
  font-style: italic;
}
.msg-row:not(.mine) .msg-edited { color: var(--text3); }

/* Reply preview in bubble */
.msg-reply-preview {
  border-left: 3px solid rgba(255,255,255,.5);
  padding: 3px 8px;
  margin-bottom: 5px;
  border-radius: 3px;
  background: rgba(255,255,255,.08);
  cursor: pointer;
}
.msg-row:not(.mine) .msg-reply-preview {
  border-left-color: var(--accent);
  background: var(--bg3);
}
.msg-reply-sender { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.8); }
.msg-row:not(.mine) .msg-reply-sender { color: var(--accent2); }
.msg-reply-text { font-size: 12px; color: rgba(255,255,255,.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
.msg-row:not(.mine) .msg-reply-text { color: var(--text3); }

/* Reply bar above input */
#reply-bar {
  display: none; padding: 7px 14px;
  background: var(--bg3); border-top: 1px solid var(--border);
  align-items: center; gap: 10px; flex-shrink: 0;
}
#reply-bar.open { display: flex; }
.reply-bar-preview { flex: 1; min-width: 0; }
.reply-bar-sender { font-size: 11px; color: var(--accent2); font-weight: 600; }
.reply-bar-text   { font-size: 13px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Search bar */
#search-bar {
  display: none; padding: 8px 14px;
  background: var(--bg3); border-bottom: 1px solid var(--border);
  align-items: center; gap: 8px; flex-shrink: 0;
}
#search-bar.open { display: flex; }
#search-input {
  flex: 1; padding: 6px 12px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text); font-size: 13px;
  font-family: inherit; outline: none;
}
#search-input:focus { border-color: var(--accent); }
.search-result-item {
  padding: 7px 10px; border-radius: 7px; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.search-result-item:hover { background: var(--surface); }
.search-result-item:last-child { border-bottom: none; }
.search-highlight { background: rgba(251,191,36,.3); border-radius: 2px; padding: 0 1px; }

/* Forward modal */
#forward-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 600;
  align-items: center; justify-content: center;
}
#forward-modal.open { display: flex; }

/* File attachments */
.msg-image { max-width: 260px; max-height: 220px; border-radius: 10px; display: block; cursor: zoom-in; object-fit: cover; transition: opacity .12s; }
.msg-image:hover { opacity: .88; }
.msg-file-link { display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: rgba(255,255,255,.08); border-radius: 8px; text-decoration: none; margin-top: 4px; transition: background .12s; }
.msg-row.mine .msg-file-link { background: rgba(255,255,255,.15); }
.msg-file-link:hover { background: rgba(255,255,255,.2); }
.msg-file-icon { width: 34px; height: 34px; border-radius: 7px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; }
.msg-file-name { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
.msg-row.mine .msg-file-name { color: #fff; }
.msg-file-size { font-size: 11px; color: var(--text3); margin-top: 1px; }
.msg-row.mine .msg-file-size { color: rgba(255,255,255,.6); }

/* Inline edit */
.msg-editing .msg-bubble { display: none; }
.msg-edit-form { display: none; flex: 1; }
.msg-editing .msg-edit-form { display: flex; gap: 6px; align-items: flex-end; }
.msg-edit-input { flex: 1; padding: 7px 11px; background: var(--bg3); border: 1px solid var(--accent); border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; resize: none; line-height: 1.45; }
.msg-edit-save, .msg-edit-cancel { padding: 6px 10px; border-radius: 7px; font-size: 12px; border: 1px solid var(--border2); cursor: pointer; font-family: inherit; }
.msg-edit-save { background: var(--accent); color: #fff; border-color: var(--accent); }
.msg-edit-cancel { background: none; color: var(--text3); }

/* Context menu */
.msg-read-tick {
  display: inline-flex; align-items: center;
  align-self: flex-end; flex-shrink: 0; margin-left: 1px;
}

.ctx-menu { position: fixed; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 5px; min-width: 160px; box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 9998; animation: ctxIn .1s ease; }
@keyframes ctxIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.ctx-item { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-radius: 7px; font-size: 13px; color: var(--text2); cursor: pointer; transition: background .1s,color .1s; font-family: inherit; background: none; border: none; width: 100%; text-align: left; }
.ctx-item:hover { background: var(--surface); color: var(--text); }
.ctx-item.danger { color: var(--red); }
.ctx-item.danger:hover { background: rgba(248,113,113,.12); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* Input area */
.chat-input-area { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg2); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
.chat-action-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text3); cursor: pointer; border-radius: 8px; transition: background .12s, color .12s; flex-shrink: 0; }
.chat-action-btn:hover { background: var(--surface); color: var(--text); }
.chat-input { flex: 1; padding: 9px 13px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; resize: none; max-height: 120px; min-height: 38px; line-height: 1.45; transition: border-color .12s; }
.chat-input:focus { border-color: var(--accent); }
.chat-send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .12s, transform .1s; }
.chat-send-btn:hover { opacity: .88; }
.chat-send-btn:active { transform: scale(.94); }

/* Emoji picker overlay */
#emoji-picker-wrap { display: none; position: absolute; bottom: 58px; left: 0; right: 0; z-index: 100; border-top: 1px solid var(--border); box-shadow: 0 -8px 32px rgba(0,0,0,.3); }
#emoji-picker-wrap em-emoji-picker { --background-rgb: var(--bg3); --border-radius: 0; --shadow: none; width: 100% !important; max-width: 100% !important; height: 370px !important; max-height: 370px !important; }

/* File preview */
#file-preview-bar { display: none; padding: 7px 14px; background: var(--bg3); border-top: 1px solid var(--border); align-items: center; gap: 10px; flex-shrink: 0; }

/* Drop overlay */
#drop-overlay { display: none; position: absolute; inset: 0; background: rgba(91,127,255,.15); border: 3px dashed var(--accent); border-radius: 0 12px 12px 0; z-index: 50; align-items: center; justify-content: center; pointer-events: none; }

/* Empty state */
.chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; gap: 10px; }
.chat-empty-icon { font-size: 40px; opacity: .4; }

@media (max-width: 640px) {
  .chat-layout { grid-template-columns: 1fr; height: auto; }
  .chat-sidebar { display: none; }
}
</style>

{% block chat_content %}{% endblock %}

{% endblock %}
